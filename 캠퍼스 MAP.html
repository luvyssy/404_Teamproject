<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #EBE9DD;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .title-box {
            background-color: #D4C7AF;
            color: #544C42;
            text-align: center;
            padding: 10px;
        }

        h2 {
            font-family: 'Bowlby One', serif;
        }

        ul {
            list-style-type: none;
            background-color: #766B5D;
            display: flex;
        }

        li {
            flex: 1;
            position: relative;
        }

        li a {
            display: block;
            color: #EBE9DD;
            text-align: center;
            padding: 16px;
            text-decoration: none;
        }

        li a:hover {
            background-color: #544C42;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: #766B5D;
            z-index: 10;
        }

        .dropdown a {
            color: #EBE9DD;
            padding: 12px 16px;
        }

        .dropdown a:hover {
            background-color: #544C42;
        }

        li:hover .dropdown {
            display: block;
        }

        .map-page {
            display: flex;
            width: 100%;
            min-height: 700px;
            background-color: #EBE9DD;
            padding: 20px;
            gap: 20px;
        }

        .left-map {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .left-map img {
            width: 1000px;
            height: auto;
            display: block;
        }

        .right-info {
            width: 30%;
            display: flex;
            flex-direction: column;
            border-radius: 60px;
            overflow: hidden;
        }

        .right-photo {
            height: 50%;
        }

        .right-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .right-title {
            height: 50%;
            background-color: #F5F4EF;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .right-title a {
            color: #353018;
            font-size: 38px;
            font-weight: 900;
            text-decoration: none;
            line-height: 1.7;
        }

        .right-title a:hover {
            color: #766B5D;
        }

        footer {
  background-color: #766b5d;
  color: #ebe9dd;
  padding: 50px 10%;
}
.footer-box {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 200px;
}
.footer-contact form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
  max-width: 400px;
}
.input-group {
  display: flex;
  gap: 10px;
}
.input-group input {
  flex: 1;
  padding: 8px;
}
textarea {
  padding: 15px;
  margin-top: 15px;
}
button {
  padding: 8px;
  background-color: #d4c7af;
  margin-top: 15px;
  width: 100px;
  border: none;
  cursor: pointer;
}
.input-group input,
textarea,
button {
  padding: 10px;
  border-radius: 15px;
  border: none;
  outline: none;
}
.message-group {
  display: flex;
  gap: 12px;
  align-items: stretch;
}
.infromation p {
  color: #ebe9dd;
  text-align: left;
}
.intro-text {
  margin-bottom: 60px;
  padding: 0 20px;
  font-size: 1.1rem;
  line-height: 1.6;
}
.info-section {
  display: flex;
  justify-content: center;
  gap: 30px;
  max-width: 1200px;
  margin: 60px auto 100px auto;
  padding: 0 20px;
}
.info-box {
  background-color: #f7f6f0;
  border: 2px solid #d4c7af;
  border-radius: 20px;
  padding: 40px 25px;
  width: 320px;
  height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.box-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 20px;
  height: 100%;
  width: 100%;
  margin: auto 0;
}
.info-box h3 {
  font-family: "Noto Sans KR", sans-serif;
  font-weight: 700;
  color: #544c42;
  margin: 0;
}
.info-box p {
  color: #6e655a;
  line-height: 2;
  text-align: center;
  word-break: keep-all;
}
    </style>
</head>
